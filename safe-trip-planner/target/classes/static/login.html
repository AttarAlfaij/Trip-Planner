<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | Safe Trip Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle, #dff6ff, #f5faff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        .panel-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .panel-sub {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        .github-btn {
            display: block;
            padding: 12px;
            border-radius: 8px;
            background: #24292e;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .github-btn:hover {
            background: black;
            transform: translateY(-2px);
        }

        .msg {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="auth-card">

    <div class="panel active">
        <div class="panel-title">Welcome to Safe Trip 👋</div>
        <div class="panel-sub">Login with GitHub to continue</div>

        <a href="/oauth2/authorization/github" class="github-btn">
            Continue with GitHub
        </a>

        <div class="msg">No password needed</div>
    </div>

</div>

</body>

</html>
